# =====================================================
# Pass The Paper - Application Configuration
# =====================================================

# Server
server.port=8080
server.servlet.context-path=/api

# DataSource (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/pass_the_paper?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Nuhash@2001
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=varchar

# JWT - must be a base64-encoded 256-bit secret
app.jwt.secret=cGFzc3RoZXBhcGVyLXN1cGVyLXNlY3JldC1rZXktZm9yLWpzb24td2ViLXRva2VuLWF1dGg=
app.jwt.expiration-ms=86400000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Logging
logging.level.com.passthepaper=INFO
logging.level.org.springframework.security=WARN
